version: "3"

vars:
  PYTHON3: python
  PIP3: pip

tasks:
  default:
    deps: [test, clean, compile]

  all:
    deps: [test, clean, compile, install]

  upload:
    deps: [test, clean, sdist]

  test:
    desc: Run pytest and kest
    cmds:
      - pytest
      - kest

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf build dist *.egg-info */*__pycache__ */*/*__pycache__

  compile:
    desc: Build wheel distribution
    cmds:
      - "{{.PYTHON3}} setup.py bdist_wheel"

  install:
    desc: Install the built wheel locally
    cmds:
      - "{{.PIP3}} install dist/*.whl --force-reinstall --no-deps"

  sdist:
    desc: Build and upload source distribution
    cmds:
      - "{{.PYTHON3}} setup.py sdist"
      - twine upload dist/*.gz --verbose

  tag:
    desc: Create annotated git tag v* from kuki/version.py and push to origin
    cmds:
      - |
        set -euo pipefail
        VERSION="$({{.PYTHON3}} -c 'from pathlib import Path; ns={}; exec(Path("kuki/version.py").read_text(), ns); print(ns["__version__"])')"
        git tag -a "v${VERSION}" -m "Release v${VERSION}"
        git push origin "v${VERSION}"
